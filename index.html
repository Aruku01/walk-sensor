<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>歩行検出（リズム方式）</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #now { font-size: 36px; margin: 10px; }
    #state { font-size: 28px; margin: 15px; padding: 10px; border-radius: 8px; }
    .walking { background: #2a7; color: white; }
    .idle { background: #eee; color: #666; }
    #count { font-size: 60px; color: #2a7; }
    button { font-size: 22px; padding: 15px 30px; }
  </style>
</head>
<body>
  <h2>歩行検出（リズム方式）</h2>
  <button id="startBtn">スタート</button>
  <div>動き: <span id="now">-</span></div>
  <div id="state" class="idle">待機中</div>
  <div>歩数: <span id="count">0</span></div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const nowEl = document.getElementById('now');
    const stateEl = document.getElementById('state');
    const countEl = document.getElementById('count');

    // --- チューニング値 ---
    const THRESHOLD = 3.0;        // 山とみなす動きの大きさ
    const REFRACTORY_MS = 250;    // 1歩の最小間隔（これ以内の山は無視）
    const RHYTHM_MIN_MS = 300;    // 歩行リズムの間隔の下限
    const RHYTHM_MAX_MS = 900;    // 歩行リズムの間隔の上限
    const NEED_RHYTHM = 3;        // 何回リズムが続いたら歩行とみなすか

    // 音の準備
    let audioCtx = null;
    function beep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 1000;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    }

    let count = 0;
    let lastPeakTime = 0;
    let rhythmCount = 0;       // 連続してリズムが合った回数
    let aboveThreshold = false;
    let isWalking = false;

    startBtn.addEventListener('click', async () => {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') {
          nowEl.textContent = '許可されませんでした';
          return;
        }
      }
      // 音を鳴らす準備（ユーザー操作の中で作る必要がある）
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      window.addEventListener('devicemotion', (e) => {
        const a = e.acceleration;
        if (!a || a.x === null) { nowEl.textContent = '取得不可'; return; }
        const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
        nowEl.textContent = mag.toFixed(1);

        const now = Date.now();

        // 閾値を下から上に超えた瞬間 = 山
        if (mag > THRESHOLD && !aboveThreshold) {
          aboveThreshold = true;
          const interval = now - lastPeakTime;

          if (interval >= REFRACTORY_MS) {
            // この山が歩行リズムの間隔内か
            if (interval >= RHYTHM_MIN_MS && interval <= RHYTHM_MAX_MS) {
              rhythmCount++;   // リズムが続いた
            } else {
              rhythmCount = 1; // リズム途切れ。仕切り直し
            }
            lastPeakTime = now;

            // 規定回数リズムが続いたら歩行中
            if (rhythmCount >= NEED_RHYTHM) {
              isWalking = true;
            }

            // 歩行中なら、この山で音を鳴らして歩数を数える
            if (isWalking) {
              beep();
              count++;
              countEl.textContent = count;
            }
          }
        } else if (mag < THRESHOLD) {
          aboveThreshold = false;
        }

        // しばらく山が来なければ歩行終了とみなす
        if (now - lastPeakTime > RHYTHM_MAX_MS) {
          if (isWalking || rhythmCount > 0) {
            isWalking = false;
            rhythmCount = 0;
          }
        }

        // 表示更新
        if (isWalking) {
          stateEl.textContent = '歩行中';
          stateEl.className = 'walking';
        } else {
          stateEl.textContent = '待機中';
          stateEl.className = 'idle';
        }
      });
      startBtn.style.display = 'none';
    });
  </script>
</body>
</html>
