<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>加速度テスト</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    #raw { font-size: 32px; color: #888; margin: 15px; }
    #motion { font-size: 64px; margin: 20px; }
    button { font-size: 24px; padding: 20px 40px; }
  </style>
</head>
<body>
  <h2>加速度テスト</h2>
  <button id="startBtn">スタート</button>
  <div>重力込み: <span id="raw">-</span></div>
  <div>動きだけ: <span id="motion">-</span></div>

  <script>
    const btn = document.getElementById('startBtn');
    const rawEl = document.getElementById('raw');
    const motionEl = document.getElementById('motion');

    btn.addEventListener('click', async () => {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') {
          motionEl.textContent = '許可されませんでした';
          return;
        }
      }
      window.addEventListener('devicemotion', (e) => {
        // 重力込みの加速度
        const ag = e.accelerationIncludingGravity;
        if (ag) {
          const rawMag = Math.sqrt(ag.x*ag.x + ag.y*ag.y + ag.z*ag.z);
          rawEl.textContent = rawMag.toFixed(1);
        }

        // 重力を除いた加速度（ブラウザが計算済み）
        const a = e.acceleration;
        if (a && a.x !== null) {
          const motionMag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
          motionEl.textContent = motionMag.toFixed(1);
        } else {
          motionEl.textContent = '取得不可';
        }
      });
      btn.style.display = 'none';
    });
  </script>
</body>
</html>
