<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>歩行検出</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    #motion { font-size: 40px; margin: 15px; }
    #count { font-size: 80px; margin: 20px; color: #2a7; }
    button { font-size: 24px; padding: 20px 40px; }
  </style>
</head>
<body>
  <h2>歩行検出</h2>
  <button id="startBtn">スタート</button>
  <div>動きだけ: <span id="motion">-</span></div>
  <div>歩数: <span id="count">0</span></div>

  <script>
    const btn = document.getElementById('startBtn');
    const motionEl = document.getElementById('motion');
    const countEl = document.getElementById('count');

    // --- チューニング値 ---
    const THRESHOLD = 2.0;      // ★この値を超えたら「山」とみなす
    const REFRACTORY_MS = 300;  // 一度数えたら次まで最低これだけ空ける（ミリ秒）

    let count = 0;
    let lastStepTime = 0;
    let aboveThreshold = false;  // 今、閾値を超えている最中か

    btn.addEventListener('click', async () => {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') {
          motionEl.textContent = '許可されませんでした';
          return;
        }
      }
      window.addEventListener('devicemotion', (e) => {
        const a = e.acceleration;
        if (!a || a.x === null) {
          motionEl.textContent = '取得不可';
          return;
        }
        const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
        motionEl.textContent = mag.toFixed(1);

        const now = Date.now();

        // 閾値を下から上に超えた瞬間だけ1歩とカウント
        if (mag > THRESHOLD && !aboveThreshold) {
          aboveThreshold = true;
          if (now - lastStepTime >= REFRACTORY_MS) {
            count++;
            countEl.textContent = count;
            lastStepTime = now;
          }
        } else if (mag < THRESHOLD) {
          aboveThreshold = false;
        }
      });
      btn.style.display = 'none';
    });
  </script>
</body>
</html>
