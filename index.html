<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>歩行センサー（スマホ用）</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #now { font-size: 36px; margin: 10px; }
    #state { font-size: 26px; margin: 15px; padding: 10px; border-radius: 8px; }
    .walking { background: #2a7; color: white; }
    .idle { background: #eee; color: #666; }
    #count { font-size: 50px; color: #2a7; }
    #conn { font-size: 16px; color: #888; }
    button { font-size: 22px; padding: 15px 40px; }
  </style>
</head>
<body>
  <h2>歩行センサー（スマホ用）</h2>
  <button id="startBtn">スタート</button>
  <div>動き: <span id="now">-</span></div>
  <div id="state" class="idle">待機中</div>
  <div>送信数: <span id="count">0</span></div>
  <div id="conn">Firebase: 未接続</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzgPWKAHiDYkBR-AgSOuTiNX3y3v5G4Zo",
      authDomain: "walk-only.firebaseapp.com",
      databaseURL: "https://walk-only-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "walk-only",
      storageBucket: "walk-only.firebasestorage.app",
      messagingSenderId: "941792403114",
      appId: "1:941792403114:web:8417b8873ec5e4ccadfad3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stepRef = ref(db, 'step');
    document.getElementById('conn').textContent = 'Firebase: 接続済み';

    const startBtn = document.getElementById('startBtn');
    const nowEl = document.getElementById('now');
    const stateEl = document.getElementById('state');
    const countEl = document.getElementById('count');

    // --- チューニング値 ---
    const THRESHOLD = 3.0;
    const REFRACTORY_MS = 400;
    const RHYTHM_MIN_MS = 400;
    const RHYTHM_MAX_MS = 750;
    const NEED_RHYTHM = 4;

    let count = 0;
    let lastPeakTime = 0;
    let rhythmCount = 0;
    let aboveThreshold = false;
    let isWalking = false;

    startBtn.addEventListener('click', async () => {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') { nowEl.textContent = '許可されませんでした'; return; }
      }
      window.addEventListener('devicemotion', (e) => {
        const a = e.acceleration;
        if (!a || a.x === null) { nowEl.textContent = '取得不可'; return; }
        const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
        nowEl.textContent = mag.toFixed(1);
        const now = Date.now();

        if (mag > THRESHOLD && !aboveThreshold) {
          aboveThreshold = true;
          const interval = now - lastPeakTime;
          if (interval >= REFRACTORY_MS) {
            if (interval >= RHYTHM_MIN_MS && interval <= RHYTHM_MAX_MS) {
              rhythmCount++;
            } else {
              rhythmCount = 1;
            }
            lastPeakTime = now;
            if (rhythmCount >= NEED_RHYTHM) isWalking = true;

            if (isWalking) {
              set(stepRef, { time: now, side: (count % 2 === 0 ? 'L' : 'R') });
              count++;
              countEl.textContent = count;
            }
          }
        } else if (mag < THRESHOLD) {
          aboveThreshold = false;
        }

        if (now - lastPeakTime > RHYTHM_MAX_MS) {
          isWalking = false;
          rhythmCount = 0;
        }

        stateEl.textContent = isWalking ? '歩行中' : '待機中';
        stateEl.className = isWalking ? 'walking' : 'idle';
      });
      startBtn.style.display = 'none';
    });
  </script>
</body>
</html>
