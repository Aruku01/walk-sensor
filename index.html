<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>加速度データ記録</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #now { font-size: 40px; margin: 10px; }
    #status { font-size: 18px; color: #666; margin: 10px; }
    button { font-size: 20px; padding: 15px 30px; margin: 8px; display: block; width: 80%; margin-left: auto; margin-right: auto; }
    #startBtn { background: #2a7; color: white; border: none; border-radius: 8px; }
    #stopBtn { background: #a55; color: white; border: none; border-radius: 8px; }
    #dlBtn { background: #57a; color: white; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>加速度データ記録</h2>
  <button id="startBtn">① 計測スタート</button>
  <button id="stopBtn">② 計測ストップ</button>
  <button id="dlBtn">③ CSVダウンロード</button>
  <div>現在値: <span id="now">-</span></div>
  <div id="status">未計測</div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const dlBtn = document.getElementById('dlBtn');
    const nowEl = document.getElementById('now');
    const statusEl = document.getElementById('status');

    let recording = false;
    let data = [];        // {t, ax, ay, az, mag} を溜める
    let startTime = 0;
    let handler = null;

    startBtn.addEventListener('click', async () => {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') {
          statusEl.textContent = '許可されませんでした';
          return;
        }
      }

      data = [];
      startTime = Date.now();
      recording = true;
      statusEl.textContent = '計測中...';

      handler = (e) => {
        const a = e.acceleration;
        if (!a || a.x === null) {
          nowEl.textContent = '取得不可';
          return;
        }
        const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
        nowEl.textContent = mag.toFixed(1);

        if (recording) {
          const t = (Date.now() - startTime) / 1000;  // 経過秒
          data.push({
            t: t.toFixed(3),
            ax: a.x.toFixed(3),
            ay: a.y.toFixed(3),
            az: a.z.toFixed(3),
            mag: mag.toFixed(3)
          });
          statusEl.textContent = '計測中... ' + data.length + '件';
        }
      };
      window.addEventListener('devicemotion', handler);
    });

    stopBtn.addEventListener('click', () => {
      recording = false;
      statusEl.textContent = '計測終了：' + data.length + '件記録';
    });

    dlBtn.addEventListener('click', () => {
      if (data.length === 0) {
        statusEl.textContent = 'データがありません';
        return;
      }
      let csv = 'time,ax,ay,az,mag\n';
      for (const d of data) {
        csv += `${d.t},${d.ax},${d.ay},${d.az},${d.mag}\n`;
      }
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'walk_data.csv';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
